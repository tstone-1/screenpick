name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS is the primary cross-platform target AND the only OS that runs the
  # Specta binding-drift test (`specta_export::export_typescript_bindings`),
  # which is what catches mismatches between `src/lib/bindings.ts` and the
  # live Rust IPC contract.
  macos:
    name: macOS — full check (bindings + tests)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install macOS Tauri deps
        # libsoup/webkitgtk aren't needed on macOS, but Tauri 2's build needs
        # nothing extra here beyond Xcode CLT, which the runner ships with.
        run: rustc --version && cargo --version

      - name: Rust formatting check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Install JS deps
        run: npm ci

      - name: TypeScript / Svelte check
        run: npm run check

      - name: Vitest unit tests
        run: npm run test:unit

      - name: Rust unit tests (includes Specta drift check)
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  linux:
    name: Linux - Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libpipewire-0.3-dev libgbm-dev

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  # Windows runs the non-binding-drift subset of Rust tests plus the JS
  # checks. The GUI-backed modules are cfg-gated out of Windows unit-test
  # builds because the generated GUI manifest pulls in linker dependencies the
  # test harness cannot satisfy there, so macOS/Linux own that coverage.
  windows:
    name: Windows — Rust + frontend checks
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: npm ci

      - name: TypeScript / Svelte check
        run: npm run check

      - name: Vitest unit tests
        run: npm run test:unit

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
